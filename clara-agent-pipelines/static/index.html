<!DOCTYPE html>
<html>
<head>

<title>Clara AI Agent Pipeline</title>

<style>

body {
    font-family: Arial;
    margin: 40px;
}

textarea {
    width: 100%;
    height: 200px;
}

pre {
    background: #f4f4f4;
    padding: 10px;
}

.diff {
    background: #fff3cd;
    padding: 10px;
    margin-top: 20px;
}

</style>

</head>

<body>

<h2>Clara Agent Demo</h2>

<input type="file" id="file"/>

<br><br>

<button onclick="demo()">Run Demo Pipeline</button>

<button onclick="onboard()">Run Onboarding Pipeline</button>

<h3>Response</h3>

<pre id="result"></pre>

<h3>Changes (v1 → v2)</h3>

<div id="diff" class="diff"></div>


<script>

async function demo() {

    const fileInput = document.getElementById("file")

    const formData = new FormData()

    formData.append("file", fileInput.files[0])

    const res = await fetch("/demo-call", {

        method: "POST",
        body: formData

    })

    const data = await res.json()

    document.getElementById("result").textContent =
        JSON.stringify(data, null, 2)

    document.getElementById("diff").textContent = ""
}


async function onboard() {

    const fileInput = document.getElementById("file")

    const formData = new FormData()

    formData.append("file", fileInput.files[0])

    const res = await fetch("/onboarding-call", {

        method: "POST",
        body: formData

    })

    const data = await res.json()

    document.getElementById("result").textContent =
        JSON.stringify(data, null, 2)

    if (data.changes) {

        document.getElementById("diff").textContent =
            JSON.stringify(data.changes, null, 2)

    } else {

        document.getElementById("diff").textContent =
            "No changes detected"

    }
}

</script>

</body>
</html>
